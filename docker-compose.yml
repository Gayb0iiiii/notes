services:
  app-web:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm --filter @notes/web dev"
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - api
      - collab

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "apk add --no-cache python3 make g++ && corepack enable && pnpm install && pnpm --filter @notes/api db:migrate && pnpm --filter @notes/api dev"
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  collab:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm --filter @notes/collab dev"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - COLLAB_PORT=4001
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
      POSTGRES_DB: notes
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notes"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: notes
      MINIO_ROOT_PASSWORD: notes-password
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  create-bucket:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 notes notes-password;
      mc mb --ignore-existing local/notes-assets;
      "

  caddy:
    image: caddy:2.8-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app-web
      - api
      - collab

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
