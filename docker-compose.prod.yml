services:
  app-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    environment:
      NODE_ENV: production
    expose:
      - "5173"
    depends_on:
      - api
      - collab
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  collab:
    build:
      context: .
      dockerfile: Dockerfile
      target: collab
    env_file:
      - .env
    environment:
      COLLAB_PORT: 4001
    expose:
      - "4001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-notes}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-notes} -d $${POSTGRES_DB:-notes}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"
    restart: unless-stopped

  create-bucket:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb --ignore-existing local/$${S3_BUCKET};
      "
    env_file:
      - .env
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    command: pnpm --filter @notes/api exec tsx src/seed.ts
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    profiles:
      - seed
    restart: "no"

  caddy:
    image: caddy:2.8-alpine
    environment:
      APP_HOST: ":80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "127.0.0.1:18081:80"
    depends_on:
      - app-web
      - api
      - collab
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
